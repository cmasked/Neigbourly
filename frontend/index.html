    <style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        .full-page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url('/static/assets/ea29701a-61be-4a2a-b22c-c8f381d8fe71.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: opacity(0.32) blur(1px);
        }
        .shelf-plank {
            height: 20px;
            background: linear-gradient(to bottom, #dcc8b1 0%, #c4af96 100%);
            border-bottom: 4px solid #b39b7f;
            border-radius: 2px 2px 10px 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 15px 25px -5px rgba(78, 69, 55, 0.15);
            position: relative;
            z-index: 20;
        }
        .shelf-plank::before {
            content: "";
            position: absolute;
            top: -14px;
            left: 0;
            right: 0;
            height: 14px;
            background: #e6d5c1;
            transform: perspective(100px) rotatex(15deg);
            transform-origin: bottom;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
        }
        .contact-shadow {
            position: absolute;
            bottom: -2px;
            left: 5%;
            width: 90%;
            height: 6px;
            background: rgba(0, 0, 0, 0.6);
            filter: blur(3px);
            border-radius: 50%;
            z-index: 5;
        }
        .ambient-shadow {
            position: absolute;
            bottom: -15px;
            left: -5%;
            width: 110%;
            height: 40px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.25) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(12px);
            z-index: 2;
            transition: all 0.4s ease;
        }
        .item-container:hover .ambient-shadow {
            transform: scale(1.15);
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0) 75%);
        }
        .item-image-wrapper {
            position: relative;
            z-index: 10;
            overflow: hidden;
            border-radius: 0.75rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        }
        .item-image-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 10%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.2), transparent);
            pointer-events: none;
        }
        .item-image-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.15) 0%, transparent 40%);
            z-index: 11;
            pointer-events: none;
        }
        .item-image {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .item-container:hover .item-image {
            transform: translatey(-8px) scale(1.02);
        }
        .golden-hour-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 230, 150, 0.03) 0%, rgba(255, 180, 50, 0.05) 100%);
            pointer-events: none;
            z-index: 100;
        }
        /* Custom scrollbar hiding utility */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Gradient Button */
        button.bg-gradient-to-b {
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>

<body class="bg-surface/90 font-body text-on-surface">
    <div class="full-page-bg"></div>
    <div class="golden-hour-overlay"></div>
